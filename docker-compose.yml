services:
  postgres:
    image: postgres:16
    container_name: simpleserver-postgres
    environment:
      POSTGRES_USER: simpleserver
      POSTGRES_PASSWORD: simpleserver
      POSTGRES_DB: simpleserver
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data:
